<html>

<head>
    <title>Combinators</title>
    <style>
        div p {
            color: green;
        }
        div > p {
            font-size: large;
        }
        div + p {
            color: red;
        }
        div ~ p {
            background-color: yellow;
        }
    </style>
</head>

<body>
    <span>
        <div>First</div>
        <article>
            <div>Second</div>
        </article>
        <div>Third</div>
    </span>
    <div>Fourth</div>
    <div>Fifth</div>
</body>

</html>
